version: "2"
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - misspell
    - perfsprint
    - prealloc
    - revive
    - staticcheck
    - tagalign
    - unused
    - whitespace
  settings:
    gocritic:
      enabled-tags:
        - performance
        - style
        - diagnostic
    revive:
      rules:
        - name: exported
        - name: blank-imports
        - name: context-as-argument
        - name: error-naming
        - name: error-strings
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
